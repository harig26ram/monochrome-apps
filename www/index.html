<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>HP_Monochrome</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    height: 100dvh;
    text-align: center;
    padding: 2rem;
    -webkit-user-select: none;
    user-select: none;
    overflow: hidden;
    position: relative;
}
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
        radial-gradient(ellipse 600px 400px at 30% 20%, rgba(88, 28, 135, 0.12), transparent),
        radial-gradient(ellipse 500px 500px at 70% 80%, rgba(30, 64, 175, 0.08), transparent);
    pointer-events: none;
    z-index: 0;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(16px) scale(0.96); } to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); } }
@keyframes toastOut { from { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); } to { opacity: 0; transform: translateX(-50%) translateY(8px) scale(0.96); } }

/* Status bar */
#source-status {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 9998;
    padding: 0.5rem 1rem;
    padding-top: calc(0.5rem + env(safe-area-inset-top, 0px));
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.01em;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
#source-status .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
}
#source-status.checking {
    background: rgba(26, 26, 46, 0.7);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    color: #888;
}
#source-status.checking .status-dot { background: #888; animation: pulse 1.2s ease-in-out infinite; }
#source-status.ok {
    background: rgba(0, 34, 0, 0.6);
    border-bottom: 1px solid rgba(74, 222, 128, 0.15);
    color: #4ade80;
}
#source-status.ok .status-dot { background: #4ade80; box-shadow: 0 0 8px rgba(74, 222, 128, 0.4); }
#source-status.error {
    background: rgba(34, 0, 0, 0.6);
    border-bottom: 1px solid rgba(248, 113, 113, 0.15);
    color: #f87171;
}
#source-status.error .status-dot { background: #f87171; box-shadow: 0 0 8px rgba(248, 113, 113, 0.4); }

/* Update banner */
#update-banner {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 9999;
    padding: 0.65rem 1rem;
    padding-top: calc(0.65rem + env(safe-area-inset-top, 0px));
    background: rgba(26, 26, 46, 0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
}
#update-banner .banner-inner {
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
}
#update-banner .banner-text {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.7);
}
#update-banner .banner-text strong { color: #fff; font-weight: 600; }
#update-banner .banner-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
#update-banner .btn-download {
    background: #fff;
    color: #000;
    border: none;
    padding: 0.35rem 0.9rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: opacity 0.2s, transform 0.15s;
}
#update-banner .btn-download:active { opacity: 0.7; transform: scale(0.97); }
#update-banner .btn-dismiss {
    background: transparent;
    color: rgba(255,255,255,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 0.35rem 0.75rem;
    border-radius: 999px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
}
#update-banner .btn-dismiss:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); }

/* Error toast */
#error-toast {
    display: none;
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10000;
    background: rgba(45, 27, 0, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(90, 61, 0, 0.4);
    border-radius: 14px;
    padding: 0.7rem 1.15rem;
    max-width: 88%;
    animation: toastIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,179,71,0.05);
}
#error-toast.hiding {
    animation: toastOut 0.25s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}
#error-toast .toast-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.65rem;
}
#error-toast .toast-icon {
    font-size: 0.9rem;
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(255, 179, 71, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffb347;
    font-weight: 700;
}
#error-toast .toast-text {
    font-size: 0.8rem;
    color: #ffb347;
    flex: 1;
    line-height: 1.3;
}
#error-toast .toast-dismiss {
    background: transparent;
    color: rgba(255,179,71,0.5);
    border: 1px solid rgba(90, 61, 0, 0.3);
    padding: 0.25rem 0.6rem;
    border-radius: 999px;
    font-size: 0.7rem;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
}
#error-toast .toast-dismiss:hover { border-color: rgba(90, 61, 0, 0.6); color: #ffb347; }

/* Main content */
.hero { position: relative; z-index: 1; animation: fadeIn 0.6s ease-out; }
.icon {
    width: 56px;
    height: 56px;
    margin-bottom: 1.75rem;
    opacity: 0.3;
    filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.15));
}
h1 {
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
    letter-spacing: -0.01em;
}
p {
    font-size: 0.85rem;
    opacity: 0.4;
    margin-bottom: 2rem;
    max-width: 16rem;
    line-height: 1.55;
}
.retry-btn {
    background: #fff;
    color: #000;
    border: none;
    padding: 0.65rem 2.25rem;
    border-radius: 999px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 2px 12px rgba(255,255,255,0.08);
}
.retry-btn:hover { box-shadow: 0 4px 20px rgba(255,255,255,0.12); }
.retry-btn:active { opacity: 0.7; transform: scale(0.97); }

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>
<div id="source-status" class="checking" role="status" aria-live="polite">
    <span class="status-dot"></span>
    <span id="source-status-text">Checking sources...</span>
</div>
<div id="update-banner" role="status" aria-live="polite">
    <div class="banner-inner">
        <span class="banner-text">Update available — <strong id="update-version"></strong></span>
        <div class="banner-actions">
            <a id="update-link" href="#" target="_blank" class="btn-download" rel="noopener">Download</a>
            <button class="btn-dismiss" aria-label="Dismiss update notification" onclick="dismissUpdate()">Dismiss</button>
        </div>
    </div>
</div>
<div id="error-toast" role="alert" aria-live="assertive">
    <div class="toast-inner">
        <span class="toast-icon" aria-hidden="true">!</span>
        <span class="toast-text" id="error-toast-msg">Playback issue detected</span>
        <button class="toast-dismiss" aria-label="Dismiss error" onclick="dismissError()">OK</button>
    </div>
</div>
<div class="hero">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M0 0h24v24H0z" fill="none" />
        <path fill="none" stroke="currentColor" stroke-linecap="square" stroke-width="2" d="M2.1 9.1A13.94 13.94 0 0 1 8 5.582m8 0a13.94 13.94 0 0 1 5.9 3.52M6.697 13.697q.607-.604 1.303-1.043m8 0q.697.438 1.303 1.043M12 3v11m-.707 4.293a 1 1 0 0 1 1.414 0L12 19z" />
    </svg>
    <h1>No internet connection</h1>
    <p>Check your connection and try again.</p>
    <button class="retry-btn" aria-label="Retry connection" onclick="retry()">Retry</button>
</div>
<script>
var CURRENT_VERSION = 'v1.6.0';
var REPO = 'monochrome-music/monochrome-apps';
var DISMISS_KEY = 'monochrome_update_dismissed';
var ERROR_DISMISS_KEY = 'monochrome_error_dismissed';
var errorToastTimeout = null;

function retry() {
    if (navigator.onLine) {
        window.location.href = 'https://monochrome.tf';
    }
}
window.addEventListener('online', retry);

function dismissUpdate() {
    var el = document.getElementById('update-banner');
    el.style.opacity = '0';
    el.style.transform = 'translateY(-100%)';
    setTimeout(function() { el.style.display = 'none'; }, 250);
    try { localStorage.setItem(DISMISS_KEY, '1'); } catch(e) {}
}

function dismissError() {
    var el = document.getElementById('error-toast');
    el.classList.add('hiding');
    if (errorToastTimeout) clearTimeout(errorToastTimeout);
    setTimeout(function() { el.style.display = 'none'; el.classList.remove('hiding'); }, 250);
}

function showErrorToast(msg) {
    try {
        if (localStorage.getItem(ERROR_DISMISS_KEY) === '1') return;
    } catch(e) {}
    var toast = document.getElementById('error-toast');
    document.getElementById('error-toast-msg').textContent = msg || 'Playback issue detected';
    toast.style.display = 'block';
    toast.classList.remove('hiding');
    if (errorToastTimeout) clearTimeout(errorToastTimeout);
    errorToastTimeout = setTimeout(function() { dismissError(); }, 6000);
}

function setSourceStatus(status, text) {
    var el = document.getElementById('source-status');
    var txt = document.getElementById('source-status-text');
    el.className = status;
    txt.textContent = text;
}

function checkSourceStatus() {
    setSourceStatus('checking', 'Checking sources...');
    var siteOk = false, apiOk = false;
    function updateStatus() {
        if (siteOk && apiOk) {
            setSourceStatus('ok', 'Source OK');
            setTimeout(function() {
                var el = document.getElementById('source-status');
                el.style.opacity = '0';
                setTimeout(function() { el.style.display = 'none'; }, 400);
            }, 2500);
        } else if (!siteOk && !apiOk) {
            setSourceStatus('error', 'Source unavailable');
        }
    }
    fetch('https://monochrome.tf', { mode: 'no-cors', cache: 'no-store' })
        .then(function() { siteOk = true; updateStatus(); })
        .catch(function() { siteOk = false; updateStatus(); });
    fetch('https://monochrome.tf', { method: 'HEAD', cache: 'no-store' })
        .then(function(res) { if (res.ok) apiOk = true; updateStatus(); })
        .catch(function() { apiOk = false; updateStatus(); });
    setTimeout(function() {
        if (!siteOk || !apiOk) setSourceStatus('error', 'Source slow or unavailable');
    }, 5000);
}

function checkForUpdate() {
    try {
        if (localStorage.getItem(DISMISS_KEY) === '1') return;
    } catch(e) {}
    fetch('https://api.github.com/repos/' + REPO + '/releases/latest')
        .then(function(res) {
            if (!res.ok) throw new Error('Not found');
            return res.json();
        })
        .then(function(data) {
            if (!data.tag_name || data.tag_name === CURRENT_VERSION) return;
            document.getElementById('update-version').textContent = data.tag_name;
            document.getElementById('update-link').href = data.html_url;
            document.getElementById('update-banner').style.display = 'block';
        })
        .catch(function() {});
}

checkSourceStatus();
checkForUpdate();
</script>
</body>
</html>
