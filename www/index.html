<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Monochrome</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    height: 100dvh;
    text-align: center;
    padding: 2rem;
    -webkit-user-select: none;
    user-select: none;
}
.icon {
    width: 64px;
    height: 64px;
    margin-bottom: 2rem;
    opacity: 0.4;
}
h1 {
    font-size: 1.25rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
}
p {
    font-size: 0.9rem;
    opacity: 0.5;
    margin-bottom: 2rem;
    max-width: 18rem;
    line-height: 1.5;
}
button {
    background: #fff;
    color: #000;
    border: none;
    padding: 0.7rem 2.5rem;
    border-radius: 999px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.2s;
}
button:active { opacity: 0.7; }
#source-status {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 9998;
    padding: 0.5rem 1rem;
    padding-top: calc(0.5rem + env(safe-area-inset-top, 0px));
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    font-size: 0.75rem;
    font-weight: 600;
    transition: all 0.3s ease;
}
#source-status.ok {
    background: #002200;
    border-bottom: 1px solid #004400;
    color: #4ade80;
}
#source-status.checking {
    background: #1a1a2e;
    border-bottom: 1px solid #333;
    color: #888;
}
#source-status.error {
    background: #220000;
    border-bottom: 1px solid #440000;
    color: #f87171;
}
#source-status .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
}
#source-status.ok .status-dot { background: #4ade80; }
#source-status.checking .status-dot { background: #888; animation: pulse 1s infinite; }
#source-status.error .status-dot { background: #f87171; }
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}
#update-banner {
    display: none;
    position: fixed;
    top: 28px;
    left: 0;
    right: 0;
    z-index: 9999;
    background: #1a1a2e;
    border-bottom: 1px solid #333;
    padding: 0.75rem 1rem;
}
#update-banner .banner-inner {
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
}
#update-banner .banner-text {
    font-size: 0.85rem;
    color: #e0e0e0;
}
#update-banner .banner-text strong {
    color: #fff;
}
#update-banner .banner-actions {
    display: flex;
    gap: 0.5rem;
    flex-shrink: 0;
}
#update-banner .btn-download {
    background: #fff;
    color: #000;
    border: none;
    padding: 0.4rem 1rem;
    border-radius: 999px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
}
#update-banner .btn-dismiss {
    background: transparent;
    color: #888;
    border: 1px solid #444;
    padding: 0.4rem 0.8rem;
    border-radius: 999px;
    font-size: 0.8rem;
    cursor: pointer;
}
#error-toast {
    display: none;
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10000;
    background: #2d1b00;
    border: 1px solid #5a3d00;
    border-radius: 12px;
    padding: 0.75rem 1.25rem;
    max-width: 90%;
    animation: toastPop 0.3s ease;
}
@keyframes toastPop {
    from { transform: translateX(-50%) translateY(20px); opacity: 0; }
    to { transform: translateX(-50%) translateY(0); opacity: 1; }
}
#error-toast .toast-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
}
#error-toast .toast-icon {
    font-size: 1rem;
    flex-shrink: 0;
}
#error-toast .toast-text {
    font-size: 0.85rem;
    color: #ffb347;
    flex: 1;
}
#error-toast .toast-dismiss {
    background: transparent;
    color: #888;
    border: 1px solid #5a3d00;
    padding: 0.3rem 0.7rem;
    border-radius: 999px;
    font-size: 0.75rem;
    cursor: pointer;
    flex-shrink: 0;
}
</style>
</head>
<body>
<div id="source-status" class="checking">
    <span class="status-dot"></span>
    <span id="source-status-text">Checking sources...</span>
</div>
<div id="update-banner">
    <div class="banner-inner">
        <span class="banner-text">Update available — <strong id="update-version"></strong></span>
        <div class="banner-actions">
            <a id="update-link" href="#" target="_blank" class="btn-download">Download</a>
            <button class="btn-dismiss" onclick="dismissUpdate()">Dismiss</button>
        </div>
    </div>
</div>
<div id="error-toast">
    <div class="toast-inner">
        <span class="toast-icon">!</span>
        <span class="toast-text" id="error-toast-msg">Playback issue detected</span>
        <button class="toast-dismiss" onclick="dismissError()">OK</button>
    </div>
</div>
<svg class="icon" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
<path d="M0 0h24v24H0z" fill="none" />
<path fill="none" stroke="currentColor" stroke-linecap="square" stroke-width="2" d="M2.1 9.1A13.94 13.94 0 0 1 8 5.582m8 0a13.94 13.94 0 0 1 5.9 3.52M6.697 13.697q.607-.604 1.303-1.043m8 0q.697.438 1.303 1.043M12 3v11m-.707 4.293a 1 1 0 0 1 1.414 0L12 19z" />
</svg>
<h1>No internet connection</h1>
<p>Check your connection and try again.</p>
<button onclick="retry()">Retry</button>
<script>
var CURRENT_VERSION = 'v1.2.0';
var REPO = 'monochrome-music/monochrome-apps';
var DISMISS_KEY = 'monochrome_update_dismissed';
var ERROR_DISMISS_KEY = 'monochrome_error_dismissed';
var errorToastTimeout = null;

function retry() {
    if (navigator.onLine) {
        window.location.href = 'https://monochrome.tf';
    }
}
window.addEventListener('online', retry);

function dismissUpdate() {
    document.getElementById('update-banner').style.display = 'none';
    try { localStorage.setItem(DISMISS_KEY, '1'); } catch(e) {}
}

function dismissError() {
    document.getElementById('error-toast').style.display = 'none';
    if (errorToastTimeout) clearTimeout(errorToastTimeout);
}

function showErrorToast(msg) {
    try {
        if (localStorage.getItem(ERROR_DISMISS_KEY) === '1') return;
    } catch(e) {}
    var toast = document.getElementById('error-toast');
    document.getElementById('error-toast-msg').textContent = msg || 'Playback issue detected';
    toast.style.display = 'block';
    if (errorToastTimeout) clearTimeout(errorToastTimeout);
    errorToastTimeout = setTimeout(function() {
        toast.style.display = 'none';
    }, 6000);
}

function setSourceStatus(status, text) {
    var el = document.getElementById('source-status');
    var txt = document.getElementById('source-status-text');
    el.className = status;
    txt.textContent = text;
}

function checkSourceStatus() {
    setSourceStatus('checking', 'Checking sources...');

    var siteOk = false;
    var apiOk = false;

    function updateStatus() {
        if (siteOk && apiOk) {
            setSourceStatus('ok', 'Source OK');
            setTimeout(function() {
                document.getElementById('source-status').style.opacity = '0';
                setTimeout(function() {
                    document.getElementById('source-status').style.display = 'none';
                }, 300);
            }, 3000);
        } else if (!siteOk && !apiOk) {
            setSourceStatus('error', 'Source unavailable');
        }
    }

    // Check 1: Is the site reachable?
    fetch('https://monochrome.tf', { mode: 'no-cors', cache: 'no-store' })
        .then(function() {
            siteOk = true;
            updateStatus();
        })
        .catch(function() {
            siteOk = false;
            updateStatus();
        });

    // Check 2: Try a HEAD request to detect server response
    fetch('https://monochrome.tf', { method: 'HEAD', cache: 'no-store' })
        .then(function(res) {
            if (res.ok) {
                apiOk = true;
            }
            updateStatus();
        })
        .catch(function() {
            apiOk = false;
            updateStatus();
        });

    // Timeout fallback - if no response in 5s, mark as error
    setTimeout(function() {
        if (!siteOk || !apiOk) {
            setSourceStatus('error', 'Source slow or unavailable');
        }
    }, 5000);
}

function checkForUpdate() {
    try {
        if (localStorage.getItem(DISMISS_KEY) === '1') return;
    } catch(e) {}
    fetch('https://api.github.com/repos/' + REPO + '/releases/latest')
        .then(function(res) {
            if (!res.ok) throw new Error('Not found');
            return res.json();
        })
        .then(function(data) {
            if (!data.tag_name) return;
            if (data.tag_name === CURRENT_VERSION) return;
            document.getElementById('update-version').textContent = data.tag_name;
            document.getElementById('update-link').href = data.html_url;
            document.getElementById('update-banner').style.display = 'block';
        })
        .catch(function() {});
}

checkSourceStatus();
checkForUpdate();
</script>
<script src="js/playback-monitor.js"></script>
</body>
</html>
